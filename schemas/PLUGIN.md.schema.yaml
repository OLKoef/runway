# PLUGIN.md Schema — Runway
# The plugin manifest contract. The single PLUGIN.md at the repo root MUST conform.
# Read by: Blueprint Reviewer, CI plugin-structure job (cross-checks skills[] against skills/ tree).
schema: plugin
version: 0.1.0
purpose: >
  Defines the Cowork plugin manifest: identity, version, and the authoritative lists of skills and
  slash commands. CI fails if any skill listed here lacks a conforming skills/<name>/SKILL.md, or if
  any SKILL.md is missing from this list.
applies_to: "PLUGIN.md"
format: markdown-with-frontmatter

frontmatter:
  required:
    - name
    - version
    - description
    - skills
    - commands
  fields:
    name:
      type: string
      required: true
      const: runway
      description: Plugin name as installed in Cowork.
    version:
      type: string
      required: true
      pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
      description: Semver. Drives the /runway upgrade migration system.
      example: 0.1.0
    description:
      type: string
      required: true
      description: One-line description of the plugin.
    skills:
      type: list<object>
      required: true
      min_items: 1
      description: Every skill the plugin ships. One entry per skills/<name>/SKILL.md.
      item_fields:
        name: { type: string, required: true, description: Skill name; must match a skills/<name>/ directory. }
        path: { type: string, required: true, description: "Path to the SKILL.md (e.g. skills/init/SKILL.md)." }
        model: { type: enum, values: [opus, sonnet, haiku], required: true, description: Model the skill runs on. }
        description: { type: string, required: true, description: One-line summary (mirrors the skill's own description). }
    commands:
      type: list<object>
      required: true
      min_items: 1
      description: Every slash command the plugin exposes. Multiple commands may map to one skill (e.g. mission-control).
      item_fields:
        command: { type: string, required: true, description: "Slash command including args (e.g. /runway brainstorm [feature])." }
        skill: { type: string, required: true, description: Name of the skill that handles this command. }
        status:
          type: enum
          values: [available, planned]
          required: false
          default: available
          description: >
            available — backed by a scaffolded skill (skill MUST be in skills[]).
            planned — the command's surface is documented but its skill is not scaffolded yet
            (e.g. execute/resume/upgrade during early phases). May reference a not-yet-listed skill.
        description: { type: string, required: true, description: One-line summary of the command. }

body:
  sections:
    - name: "# Runway"
      required: true
      description: H1 and a short overview of the plugin.
    - name: "## Skills"
      required: true
      description: Human-readable table mirroring the skills front-matter.
    - name: "## Commands"
      required: true
      description: Human-readable table mirroring the commands front-matter.

validation:
  - "All `frontmatter.required` fields present."
  - "`name` == \"runway\"; `version` is valid semver."
  - "Every `skills[].path` resolves to an existing file conforming to SKILL.md.schema.yaml."
  - "Every skills/<name>/SKILL.md has a matching `skills[]` entry (bijective)."
  - "Every `available` command's `skill` references a name present in `skills[]`."
  - "`planned` commands may reference a skill not yet in `skills[]` (it will be scaffolded in a later phase)."
